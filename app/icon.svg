<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The POS card reader">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- rounded app background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- bank card tapping in, tilted -->
  <g transform="rotate(-17 16 9)">
    <rect x="8.5" y="4" width="15" height="9.4" rx="1.7" fill="#dbeafe"/>
    <rect x="11" y="9.2" width="3.4" height="2.6" rx="0.5" fill="#f5b84b"/>
    <path d="M17.4 7.2a3.2 3.2 0 0 1 0 3.6M19.2 6.2a5 5 0 0 1 0 5.6"
          fill="none" stroke="#60a5fa" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- card terminal body -->
  <rect x="8.4" y="12.6" width="15.2" height="15.4" rx="2.4" fill="#ffffff"/>
  <!-- screen -->
  <rect x="10.3" y="14.3" width="11.4" height="4.9" rx="1" fill="#0b2540"/>
  <!-- keypad -->
  <g fill="#cbd5e1">
    <circle cx="12.4" cy="22" r="1"/>
    <circle cx="16" cy="22" r="1"/>
    <circle cx="19.6" cy="22" r="1"/>
    <circle cx="12.4" cy="25.3" r="1"/>
    <circle cx="16" cy="25.3" r="1"/>
    <circle cx="19.6" cy="25.3" r="1"/>
  </g>
</svg>
