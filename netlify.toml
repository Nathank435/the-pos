# Netlify config for ThePOS.co.uk (Next.js 15, App Router).
# Uses Netlify's official Next.js runtime so SSR pages, SSG and the /api/leads
# function all work — no static-export limitations.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ---------------------------------------------------------------------------
# Security headers (Sprint 1 Phase 7). CSP runs Report-Only for a week -
# check the console on the quiz, calculator and GTM tags, then enforce by
# renaming to Content-Security-Policy.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://*.google-analytics.com https://www.clarity.ms https://*.clarity.ms https://static.klaviyo.com https://static-tracking.klaviyo.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://*.google-analytics.com https://*.googletagmanager.com https://*.clarity.ms https://a.klaviyo.com https://static.klaviyo.com; frame-src https://www.googletagmanager.com"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---------------------------------------------------------------------------
# Redirect scaffold - add 301s here whenever a URL moves (e.g. blog->guides
# merge). Never delete a URL without a 301. Example:
# [[redirects]]
#   from = "/blog/some-post"
#   to = "/guides/some-guide"
#   status = 301
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/reviews/touchbistro"
  to = "/reviews/toast"
  status = 301
